name: Publish Release and Docker Hub

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: write
  packages: write
  
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25"
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          cache: true
      - name: Build Node Bundle
        run: |
          pnpm install
          pnpm run build
      - name: Update Latest Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f latest "$GITHUB_SHA"
          git push -f origin latest
      - name: Upload Release Assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: latest
        run: |
          COMMIT_MESSAGE="$(git log -1 --pretty=%B)"
          gh release delete "$RELEASE_TAG" --yes > /dev/null 2>&1 || true
          gh release create "$RELEASE_TAG" dist/minisubconvert.js dist/proxy-utils.js --title "$RELEASE_TAG" --notes "$COMMIT_MESSAGE" --latest --verify-tag
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}
          tags: |
            type=raw,value=latest
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: TARGETPLATFORM
